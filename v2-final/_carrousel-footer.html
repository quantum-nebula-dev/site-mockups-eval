<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carrousel footer — Périclès Gestion</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#0a1420;font-family:'Hanken Grotesk',system-ui,sans-serif}
  .stage{position:fixed;inset:0;top:0;bottom:0}
  iframe{width:100%;height:100%;border:0;display:block;background:#001931}
  /* barre flottante */
  .bar{
    position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:10;
    display:flex;align-items:center;gap:14px;
    background:rgba(8,16,26,.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.14);border-radius:1000px;
    padding:9px 12px;box-shadow:0 12px 40px rgba(0,0,0,.5);
    color:#fff;font-size:.86rem;letter-spacing:.01em;
  }
  .bar button{
    appearance:none;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.04);
    color:#fff;width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:1.1rem;line-height:1;
    display:grid;place-items:center;transition:background .2s,border-color .2s;
  }
  .bar button:hover{background:rgba(158,131,90,.24);border-color:#9E835A}
  .bar .name{min-width:200px;text-align:center;font-weight:600}
  .bar .name .idx{color:#9E835A;font-weight:400;margin-right:8px}
  .bar .dots{display:flex;gap:7px;margin:0 4px}
  .bar .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.22);cursor:pointer;transition:background .2s,transform .2s}
  .bar .dot.on{background:#9E835A;transform:scale(1.25)}
  .hint{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:10;color:rgba(255,255,255,.4);font-size:.76rem;letter-spacing:.06em;text-transform:uppercase}
</style>
</head>
<body>
  <div class="stage"><iframe id="frame" title="Aperçu footer"></iframe></div>
  <div class="hint">← → pour changer de variante</div>
  <div class="bar">
    <button id="prev" aria-label="Précédent">‹</button>
    <div class="dots" id="dots"></div>
    <div class="name"><span class="idx" id="idx">1/6</span><span id="label">—</span></div>
    <button id="next" aria-label="Suivant">›</button>
  </div>
<script>
  var V = [
    {file:"../_pipeline/propositions/footer-frais.html",    label:"Frais (main levée)"},
    {file:"../_pipeline/propositions/footer-wendel.html",   label:"Wendel"},
    {file:"../_pipeline/propositions/footer-pictet.html",   label:"Pictet"},
    {file:"../_pipeline/propositions/footer-brunello.html", label:"Brunello"},
    {file:"../_pipeline/propositions/footer-hermes.html",   label:"Hermès"},
    {file:"../_pipeline/propositions/footer-kering.html",   label:"Kering"}
  ];
  var i = 0;
  var frame = document.getElementById("frame");
  var idx = document.getElementById("idx");
  var label = document.getElementById("label");
  var dotsWrap = document.getElementById("dots");
  V.forEach(function(v,k){
    var d = document.createElement("div");
    d.className = "dot" + (k===0?" on":"");
    d.addEventListener("click", function(){ go(k); });
    dotsWrap.appendChild(d);
  });
  function go(n){
    i = (n + V.length) % V.length;
    frame.src = V[i].file;
    idx.textContent = (i+1) + "/" + V.length;
    label.textContent = V[i].label;
    Array.prototype.forEach.call(dotsWrap.children, function(d,k){
      d.className = "dot" + (k===i?" on":"");
    });
  }
  document.getElementById("prev").addEventListener("click", function(){ go(i-1); });
  document.getElementById("next").addEventListener("click", function(){ go(i+1); });
  window.addEventListener("keydown", function(e){
    if(e.key==="ArrowLeft"){ go(i-1); }
    else if(e.key==="ArrowRight"){ go(i+1); }
  });
  go(0);
</script>
</body>
</html>
